<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Восстановление пути после SPA-редиректа из public/404.html (GitHub Pages
         не имеет server-side rewrite; прямые ссылки из писем /verify-email,
         /reset-password и т.п. иначе отдают 404). Должно отработать ДО загрузки
         модуля /src/main.jsx, поэтому это первый inline-скрипт. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>КУБ — Комплексные услуги бизнесу</title>

    <!-- Inter Tight -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Укажем базу API для локальной разработки -->
    <script>
      (function () {
        var host = location.hostname;
        var isLocal = host === 'localhost' || host === '127.0.0.1';
        // В проде ничего не трогаем — Header возьмёт дефолт https://api.cube-tech.ru
        if (isLocal) {
          window.__API_BASE__ = 'https://api.cube-tech.ru';
        }
      })();
    </script>
  </head>
  <body>
    <!-- Мгновенная заставка на время загрузки бандла (2 МБ). Показывается ДО JS,
         поэтому пользователь по deeplink из письма (/verify-email, /reset) видит
         брендовый «кружок с точками», а не белый экран. React затирает #root при
         монтировании — заставка исчезает сама, без скриптов. -->
    <style>
      #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
        background:#f8f8f8;font-family:'Inter Tight',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif}
      #boot .r{width:38px;height:38px;border-radius:50%;
        border:2px solid rgba(0,0,0,.12);border-top-color:#1c1c1c;
        animation:bootspin .7s linear infinite}
      @keyframes bootspin{to{transform:rotate(360deg)}}
    </style>
    <div id="root"><div id="boot"><div class="r"></div></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
